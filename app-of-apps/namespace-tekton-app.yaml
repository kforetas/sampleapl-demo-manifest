apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-namespace-app
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/kforetas/sampleapl-demo-manifest'
    targetRevision: HEAD
    path: namespaces
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
