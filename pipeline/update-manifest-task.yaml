apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-manifest
  namespace: tekton-demo
spec:
  params:
    - name: target-env
    - name: new-tag
    - name: git-url
      default: "https://github.com/kforetas/sampleapl-demo-manifest.git"
  workspaces:
    - name: source
  steps:
    - name: kustomize-edit
      image: line/kubectl-kustomize:latest
      workingDir: $(workspaces.source.path)
      script: |
        # 1. ターゲットディレクトリへ移動
        cd manifest/manifest/overlays/$(params.target-env)
        
        # 2. タグの書き換え
        kustomize edit set image docker.io/rhnconsultingkemori/sampleapl-demo=:$(params.new-tag)
        
        # 3. Gitの設定
        git config --global user.email "kforetxp@yahoo.co.jp"
        git config --global user.name "kforetas"
        
        # 4. Push実行 (Secretの認証を利用)
        git add .
        git commit -m "chore: update $(params.target-env) image to $(params.new-tag)"
        git push origin HEAD:main
