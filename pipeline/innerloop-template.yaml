apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: innerloop-template
spec:
  params:
    - name: git-url
    - name: git-revision
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: innerloop-run-
      spec:
        params:
          - name: repo-url
            value: $(tt.params.git-url)
          - name: image-tag
            value: $(tt.params.git-revision)
        pipelineRef:
          name: sampleapl-demo-pipeline
        serviceAccountName: pipeline
        workspaces:
          - name: shared-data
            emptyDir: {}
            #persistentVolumeClaim:
              #claimName: tekton-workspace-pvc
