apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: project-apps
  namespace: openshift-gitops
spec:
  description: "Application deployments for all stages"
  sourceRepos:
    - '*'
  destinations:
    - namespace: demo-*
      server: https://kubernetes.default.svc
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: project-pipeline
  namespace: openshift-gitops
spec:
  description: "Pipeline for Tekton"
  sourceRepos:
    - '*'
  destinations:
    - namespace: tekton-*
      server: https://kubernetes.default.svc
