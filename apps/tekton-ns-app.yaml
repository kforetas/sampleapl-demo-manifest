apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-namespace
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/kforetas/sampleapl-demo-manifest'
    targetRevision: HEAD
    path: namespaces/overlays
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
