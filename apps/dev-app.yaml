apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deploy-sampleapl-demo-dev
  namespace: openshift-gitops
spec:
  project: project-apps
  source:
    repoURL: 'https://github.com/kforetas/sampleapl-demo-manifest'
    targetRevision: HEAD
    path: manifest/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
